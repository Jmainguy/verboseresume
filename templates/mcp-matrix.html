<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MCP // Verbose Resume</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .overlay {
      position: fixed;
      left: 50%;
      bottom: 8%;
      transform: translateX(-50%);
      z-index: 2;
      max-width: 90vw;
      padding: 14px 20px;
      border: 1px solid rgba(110, 231, 249, 0.35);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.72);
      color: #6ee7f9;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      text-align: center;
      line-height: 1.5;
      text-shadow: 0 0 8px rgba(110, 231, 249, 0.5);
      pointer-events: none;
    }
    .overlay strong {
      display: block;
      margin-bottom: 6px;
      color: #46a3ff;
      font-size: 1.05em;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <canvas id="matrix" aria-hidden="true"></canvas>
  <p class="overlay">
    <strong>POST /mcp</strong>
    JSON-RPC only. You found the verbose endpoint—the browser is not the client.
  </p>
  <script>
    (function () {
      var canvas = document.getElementById("matrix");
      var ctx = canvas.getContext("2d");
      var chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンverboseResume.json{}";
      var fontSize = 16;
      var columns = [];
      var drops = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        columns = Math.floor(canvas.width / fontSize);
        drops = [];
        for (var i = 0; i < columns; i++) {
          drops[i] = Math.random() * -80;
        }
      }

      function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = fontSize + "px monospace";
        for (var i = 0; i < drops.length; i++) {
          var text = chars.charAt(Math.floor(Math.random() * chars.length));
          var x = i * fontSize;
          var y = drops[i] * fontSize;
          var bright = Math.random() > 0.985;
          ctx.fillStyle = bright ? "#f4f8fb" : "#6ee7f9";
          ctx.fillText(text, x, y);
          if (y > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i]++;
        }
        requestAnimationFrame(draw);
      }

      resize();
      window.addEventListener("resize", resize);
      draw();
    })();
  </script>
</body>
</html>
