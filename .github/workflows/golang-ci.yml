name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          args: --timeout=5m

  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: actions/checkout@v4

      - name: Go fmt
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            gofmt -l .
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Production build
        run: make build-prod

      - name: Verify embedded static binary runs
        run: |
          ./verboseresume &
          pid=$!
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null; then
              curl -fsS http://127.0.0.1:8080/docs >/dev/null
              curl -fsS http://127.0.0.1:8080/static/brand/favicon.svg >/dev/null
              kill "$pid"
              wait "$pid" || true
              exit 0
            fi
            sleep 0.2
          done
          kill "$pid" || true
          exit 1
